<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login | ⸙ —͞𝚂ʏᴅʀᴏx 4乃 ꜰɪʟᴍ ʜᴜʙ ᥫ᭡</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="theme-toggle-container">
    <button id="themeToggle" class="theme-toggle-btn">
      <i class="fas fa-moon"></i>
      <span>dark/white</span>
    </button>
  </div>

  <div class="login-container">
    <div class="login-card">
      <h1><i class="fas fa-film"></i> Movie Request</h1>
      <p class="subtitle">your whatsapp number</p>
      
      <form id="loginForm">
        <div class="input-group">
          <label for="name"><i class="fas fa-user"></i> name</label>
          <input type="text" id="name" placeholder="eg : dulantha" required>
        </div>
        
        <div class="input-group">
          <label for="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp number</label>
          <input type="tel" id="whatsapp" placeholder="947XXXXXXXX" pattern="[0-9]{10}" required>
          <small>eg : 94727503561</small>
        </div>
        
        <button type="submit" class="login-btn">
          <i class="fas fa-sign-in-alt"></i> ENTER
        </button>
      </form>
      
      <div class="admin-link">
        <a href="admin.html"><i class="fas fa-user-shield"></i> ENTER </a>
      </div>
    </div>
  </div>

  <!-- JavaScript Files -->
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('currentUser')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
