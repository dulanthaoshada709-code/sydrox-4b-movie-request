<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ඩෑෂ්බෝඩ් | චිත්‍රපට ඉල්ලීම්</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Top Navigation Bar -->
  <nav class="navbar">
    <div class="nav-left">
      <h2><i class="fas fa-clapperboard"></i> MovieRequest</h2>
    </div>
    <div class="nav-right">
      <button id="themeToggle" class="theme-toggle-btn nav-icon">
        <i class="fas fa-moon"></i>
      </button>
      <div class="user-menu">
        <button id="userMenuBtn" class="user-icon-btn">
          <i class="fas fa-user-circle"></i>
          <span id="userNameDisplay"></span>
        </button>
        <div id="userDropdown" class="dropdown-content hidden">
          <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> නික්මෙන්න</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Dashboard Layout -->
  <div class="dashboard-container">
    <!-- Left Sidebar with Request Button -->
    <aside class="sidebar">
      <button id="newRequestBtn" class="new-request-btn">
        <i class="fas fa-plus-circle"></i>
        <span>නව චිත්‍රපටයක් ඉල්ලන්න</span>
      </button>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <div class="content-header">
        <h3>ඔබගේ ඉල්ලීම්</h3>
      </div>
      
      <div id="requestsContainer" class="requests-grid">
        <!-- Requests will be loaded here dynamically -->
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <p>තවමත් චිත්‍රපට ඉල්ලීම් නොමැත.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Request Modal -->
  <div id="requestModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3><i class="fas fa-film"></i> නව චිත්‍රපට ඉල්ලීම</h3>
        <button class="close-modal">&times;</button>
      </div>
      <form id="movieRequestForm">
        <div class="form-group">
          <label for="movieName">චිත්‍රපටයේ නම *</label>
          <input type="text" id="movieName" placeholder="උදා: Inception" required>
        </div>
        
        <div class="form-group">
          <label for="movieSite">වෙබ් අඩවිය (විකල්ප)</label>
          <input type="text" id="movieSite" placeholder="උදා: IMDb, YouTube">
        </div>
        
        <div class="form-group">
          <label for="quality">ගුණාත්මකභාවය *</label>
          <select id="quality" required>
            <option value="">තෝරන්න</option>
            <option value="480p">480p</option>
            <option value="720p">720p</option>
            <option value="1080p">1080p</option>
          </select>
        </div>
        
        <div class="modal-actions">
          <button type="button" class="cancel-btn">අවලංගු කරන්න</button>
          <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane"></i> ඉල්ලීම යවන්න
          </button>
        </div>
      </form>
    </div>
  </div>
<!-- Footer with WhatsApp Icon -->
<footer class="app-footer">
  <div class="footer-content">
    <a href="https://www.whatsapp.com" target="_blank" rel="noopener noreferrer" class="whatsapp-link" aria-label="WhatsApp">
      <i class="fab fa-whatsapp"></i>
    </a>
    <span class="footer-text">
      ඔබ request කරන movie පැය 24ක් ඇතුළත මෙම 
      <a href="#">WhatsApp group</a> එකට දමනු ලැබේ.
    </span>
  </div>
</footer>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Redirect if not logged in
    if (!localStorage.getItem('currentUser')) {
      window.location.href = 'index.html';
    }
    
    // Initialize dashboard
    document.addEventListener('DOMContentLoaded', function() {
      initDashboard();
    });
  </script>
</body>
</html>
