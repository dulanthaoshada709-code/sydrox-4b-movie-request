<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>පරිපාලක පැනලය | චිත්‍රපට ඉල්ලීම්</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <h2><i class="fas fa-user-shield"></i> පරිපාලක පැනලය</h2>
    </div>
    <div class="nav-right">
      <button id="themeToggle" class="theme-toggle-btn nav-icon">
        <i class="fas fa-moon"></i>
      </button>
      <a href="index.html" class="back-btn"><i class="fas fa-home"></i> මුල් පිටුව</a>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <h3>සියලුම චිත්‍රපට ඉල්ලීම්</h3>
      <button id="refreshBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> නැවුම් කරන්න</button>
    </div>
    
    <div class="table-responsive">
      <table id="requestsTable" class="admin-table">
        <thead>
          <tr>
            <th>පරිශීලක නම</th>
            <th>WhatsApp</th>
            <th>චිත්‍රපට නම</th>
            <th>වෙබ් අඩවිය</th>
            <th>ගුණාත්මකභාවය</th>
            <th>තත්වය</th>
            <th>ඉල්ලූ දිනය</th>
            <th>ක්‍රියා</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Data will be loaded here -->
        </tbody>
      </table>
    </div>
    <div id="noDataMessage" class="empty-state hidden">
      <i class="fas fa-database"></i>
      <p>කිසිදු ඉල්ලීමක් සොයාගත නොහැකි විය.</p>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadAdminRequests();
      
      document.getElementById('refreshBtn').addEventListener('click', loadAdminRequests);
    });
  </script>
</body>
</html>
